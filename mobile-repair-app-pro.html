<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7c3aed">
  <title>نظام محاسبة صيانة الموبايل</title>

  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Cairo', 'sans-serif'] },
          colors: {
            primary: { 50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed', 800: '#6b21a8', 900: '#581c87' }
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Cairo', sans-serif; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    .animate-scale-in { animation: scaleIn 0.2s ease-out; }
    
    /* Glass Effect */
    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .dark .glass {
      background: rgba(30, 41, 59, 0.8);
    }
    
    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Card Hover */
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.15);
    }
    
    /* Button Active */
    .btn-press:active {
      transform: scale(0.97);
    }
    
    /* Status Colors */
    .status-pending { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    .status-diagnosing { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
    .status-waiting { background: linear-gradient(135deg, #fb923c, #f97316); }
    .status-progress { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
    .status-completed { background: linear-gradient(135deg, #4ade80, #22c55e); }
    .status-delivered { background: linear-gradient(135deg, #2dd4bf, #14b8a6); }
    .status-cancelled { background: linear-gradient(135deg, #f87171, #ef4444); }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-300">
  <div id="app"></div>
  
  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>
  
  <script>
    // ==================== المتجر ====================
    const Store = {
      data: { customers: [], repairs: [], inventory: [], invoices: [], expenses: [] },
      
      init() {
        const saved = localStorage.getItem('mobileRepairApp_v2');
        if (saved) {
          try { this.data = JSON.parse(saved); } catch(e) {}
        }
        if (!this.data.customers?.length) this.sampleData();
      },
      
      save() {
        localStorage.setItem('mobileRepairApp_v2', JSON.stringify(this.data));
      },
      
      sampleData() {
        this.data = {
          customers: [
            { id: 'c1', name: 'أحمد محمد علي', phone: '0791234567', address: 'عمان - عبدون', notes: 'عميل VIP', totalSpent: 500 },
            { id: 'c2', name: 'سارة خالد أحمد', phone: '0797654321', address: 'الزرقاء - الرصيفة', notes: '', totalSpent: 150 },
            { id: 'c3', name: 'محمد عبدالله', phone: '0799876543', address: 'إربد', notes: '', totalSpent: 0 },
            { id: 'c4', name: 'فاطمة حسن', phone: '0795551234', address: 'عمان - خلدا', notes: 'تواصل واتساب', totalSpent: 80 }
          ],
          repairs: [
            { id: 'r1', customerId: 'c1', deviceType: 'iPhone', deviceModel: 'iPhone 14 Pro Max', problem: 'شاشة مكسورة بالكامل مع تغير لون', status: 'DELIVERED', maintenanceCost: 180, finalCost: 350, deposit: 100, paidAmount: 350, debt: 0, createdAt: '2024-02-20', deliveredAt: '2024-02-23', notes: 'تم استبدال الشاشة بأصلية' },
            { id: 'r2', customerId: 'c2', deviceType: 'Samsung', deviceModel: 'Galaxy S23 Ultra', problem: 'البطارية تفرغ بسرعة كبيرة والجهاز يسخن', status: 'IN_PROGRESS', maintenanceCost: 45, finalCost: 120, deposit: 30, paidAmount: 0, debt: 0, createdAt: '2024-02-25', notes: 'تحتاج بطارية جديدة' },
            { id: 'r3', customerId: 'c3', deviceType: 'Xiaomi', deviceModel: 'Redmi Note 13 Pro', problem: 'الجهاز لا يشتغل نهائياً', status: 'DIAGNOSING', maintenanceCost: null, finalCost: null, deposit: 0, paidAmount: 0, debt: 0, createdAt: '2024-02-26', notes: '' },
            { id: 'r4', customerId: 'c4', deviceType: 'iPhone', deviceModel: 'iPhone 12', problem: 'الشاحن لا يعمل - المنفذ متسخ', status: 'COMPLETED', maintenanceCost: 15, finalCost: 40, deposit: 0, paidAmount: 0, debt: 0, createdAt: '2024-02-26', notes: 'تم تنظيف المنفذ' },
            { id: 'r5', customerId: 'c1', deviceType: 'Huawei', deviceModel: 'Mate 50 Pro', problem: 'الكاميرا الخلفية لا تعمل', status: 'WAITING_PARTS', maintenanceCost: 80, finalCost: 180, deposit: 50, paidAmount: 0, debt: 0, createdAt: '2024-02-24', notes: 'بانتظار وصول الكاميرا' }
          ],
          inventory: [
            { id: 'i1', name: 'شاشة iPhone 14 Pro Max أصلية', category: 'شاشات', quantity: 3, minQuantity: 2, costPrice: 180, sellingPrice: 280, supplier: 'Apple Parts' },
            { id: 'i2', name: 'بطارية Samsung Galaxy S23', category: 'بطاريات', quantity: 8, minQuantity: 3, costPrice: 35, sellingPrice: 70, supplier: 'Samsung Parts' },
            { id: 'i3', name: 'شاحن سريع 45W Samsung', category: 'إكسسوارات', quantity: 12, minQuantity: 5, costPrice: 15, sellingPrice: 35, supplier: 'Local' },
            { id: 'i4', name: 'كابل USB-C أصلي 2م', category: 'إكسسوارات', quantity: 2, minQuantity: 5, costPrice: 8, sellingPrice: 20, supplier: 'Local' },
            { id: 'i5', name: 'واقي شاشة iPhone 14', category: 'واقيات', quantity: 25, minQuantity: 10, costPrice: 3, sellingPrice: 10, supplier: 'Local' },
            { id: 'i6', name: 'كاميرا خلفية iPhone 12', category: 'قطع غيار', quantity: 0, minQuantity: 2, costPrice: 60, sellingPrice: 120, supplier: 'Apple Parts' }
          ],
          expenses: [
            { id: 'e1', category: 'إيجار', description: 'إيجار المحل - شباط 2024', amount: 350, date: '2024-02-01' },
            { id: 'e2', category: 'كهرباء', description: 'فاتورة الكهرباء - كانون الثاني', amount: 65, date: '2024-02-05' },
            { id: 'e3', category: 'مشتريات', description: 'شراء قطع غيار من الصين', amount: 500, date: '2024-02-10' },
            { id: 'e4', category: 'رواتب', description: 'راتب الموظف - شباط', amount: 400, date: '2024-02-28' }
          ],
          invoices: [
            { id: 'inv1', invoiceNumber: 'INV-2024-001', customerId: 'c1', items: [{desc: 'استبدال شاشة iPhone 14 Pro Max', price: 350}], total: 350, paid: 350, status: 'PAID', date: '2024-02-23' }
          ],
          settings: {
            shopName: 'صيانة الموبايل الذكية',
            phone: '0790000000',
            address: 'عمان - شارع الملكة رانيا',
            currency: 'د.أ'
          }
        };
        this.save();
      },
      
      add(col, item) { item.id = Date.now().toString(); item.createdAt = new Date().toISOString(); this.data[col].push(item); this.save(); return item; },
      update(col, id, data) { const i = this.data[col].findIndex(x => x.id === id); if (i > -1) { this.data[col][i] = {...this.data[col][i], ...data}; this.save(); } },
      delete(col, id) { this.data[col] = this.data[col].filter(x => x.id !== id); this.save(); },
      get(col, id) { return this.data[col]?.find(x => x.id === id); }
    };
    Store.init();
    
    // ==================== الحالة ====================
    let state = {
      page: 'dashboard',
      theme: localStorage.getItem('theme') || 'light',
      drawer: false,
      dialog: null,
      dialogData: null,
      deleteInfo: null,
      searchQuery: ''
    };
    
    // ==================== الثوابت ====================
    const STATUS = [
      { v: 'PENDING', l: 'قيد الانتظار', c: 'bg-amber-500', icon: 'clock' },
      { v: 'DIAGNOSING', l: 'قيد التشخيص', c: 'bg-blue-500', icon: 'search' },
      { v: 'WAITING_PARTS', l: 'انتظار القطع', c: 'bg-orange-500', icon: 'package' },
      { v: 'IN_PROGRESS', l: 'قيد الإصلاح', c: 'bg-violet-500', icon: 'wrench' },
      { v: 'COMPLETED', l: 'تم الإصلاح', c: 'bg-green-500', icon: 'check-circle' },
      { v: 'DELIVERED', l: 'تم التسليم', c: 'bg-teal-500', icon: 'truck' },
      { v: 'CANCELLED', l: 'ملغي', c: 'bg-red-500', icon: 'x-circle' }
    ];
    
    const DEVICES = ['iPhone', 'Samsung', 'Huawei', 'Xiaomi', 'Oppo', 'Vivo', 'Realme', 'Nokia', 'LG', 'HTC', 'Sony', 'Google Pixel', 'OnePlus', 'أخرى'];
    const EXPENSE_CATS = ['إيجار', 'كهرباء', 'ماء', 'رواتب', 'مشتريات', 'صيانة', 'نقل', 'ضرائب', 'تسويق', 'أخرى'];
    const INVENTORY_CATS = ['شاشات', 'بطاريات', 'قطع غيار', 'إكسسوارات', 'واقيات', 'سماعات', 'أخرى'];
    
    // ==================== الدوال المساعدة ====================
    const fmt = n => (n||0).toLocaleString('ar-SA');
    const fdate = d => d ? new Date(d).toLocaleDateString('ar-SA', {year:'numeric', month:'short', day:'numeric'}) : '-';
    const getCust = id => Store.data.customers.find(c => c.id === id)?.name || 'غير معروف';
    const getStatus = v => STATUS.find(s => s.v === v) || STATUS[0];
    const $ = id => document.getElementById(id);
    
    function toast(msg, type='success') {
      const container = $('toast-container');
      const colors = { success: 'bg-green-600', error: 'bg-red-600', warning: 'bg-amber-600', info: 'bg-blue-600' };
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      const t = document.createElement('div');
      t.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 animate-fade-in`;
      t.innerHTML = `<span class="text-lg">${icons[type]}</span><span>${msg}</span>`;
      container.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
    
    // ==================== العرض ====================
    function render() {
      $('app').innerHTML = renderApp();
      lucide.createIcons();
      document.documentElement.classList.toggle('dark', state.theme === 'dark');
    }
    
    function renderApp() {
      return `
        ${renderMobileNav()}
        ${renderDrawer()}
        ${renderSidebar()}
        ${renderMain()}
        ${renderDialog()}
      `;
    }
    
    function renderMobileNav() {
      const titles = { dashboard: 'لوحة التحكم', customers: 'العملاء', repairs: 'الصيانة', inventory: 'المخزون', invoices: 'الفواتير', expenses: 'المصاريف', debts: 'الديون', reports: 'التقارير', backup: 'النسخ الاحتياطي', settings: 'الإعدادات' };
      return `
        <nav class="lg:hidden fixed top-0 inset-x-0 z-40 glass border-b border-slate-200 dark:border-slate-700">
          <div class="flex items-center justify-between px-4 py-3">
            <button onclick="toggleDrawer()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
              <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <h1 class="font-bold text-lg">${titles[state.page] || 'الرئيسية'}</h1>
            <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
              <i data-lucide="${state.theme === 'dark' ? 'sun' : 'moon'}" class="w-5 h-5"></i>
            </button>
          </div>
        </nav>
      `;
    }
    
    function renderDrawer() {
      const delivered = Store.data.repairs.filter(r => r.status === 'DELIVERED');
      const profit = delivered.reduce((s, r) => s + ((r.finalCost||0) - (r.maintenanceCost||0)), 0);
      const expenses = Store.data.expenses.reduce((s, e) => s + e.amount, 0);
      const debts = delivered.reduce((s, r) => s + (r.debt||0), 0);
      
      const nav = [
        { id: 'dashboard', icon: 'layout-dashboard', label: 'لوحة التحكم' },
        { id: 'repairs', icon: 'wrench', label: 'الصيانة' },
        { id: 'customers', icon: 'users', label: 'العملاء' },
        { id: 'inventory', icon: 'package', label: 'المخزون' },
        { id: 'invoices', icon: 'file-text', label: 'الفواتير' },
        { id: 'expenses', icon: 'receipt', label: 'المصاريف' },
        { id: 'debts', icon: 'credit-card', label: 'الديون' },
        { id: 'reports', icon: 'bar-chart-3', label: 'التقارير' },
        { id: 'backup', icon: 'database', label: 'النسخ الاحتياطي' },
        { id: 'settings', icon: 'settings', label: 'الإعدادات' }
      ];
      
      return `
        <!-- Overlay -->
        <div class="lg:hidden fixed inset-0 bg-black/50 z-40 transition-opacity ${state.drawer ? 'opacity-100' : 'opacity-0 pointer-events-none'}" onclick="toggleDrawer()"></div>
        
        <!-- Drawer -->
        <aside class="lg:hidden fixed top-0 right-0 bottom-0 w-72 bg-white dark:bg-slate-800 z-50 shadow-2xl transform transition-transform ${state.drawer ? 'translate-x-0' : 'translate-x-full'}">
          <div class="p-4 border-b border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-600 to-blue-600 flex items-center justify-center shadow-lg shadow-violet-500/30">
                <i data-lucide="smartphone" class="w-6 h-6 text-white"></i>
              </div>
              <div>
                <h2 class="font-bold text-lg gradient-text">${Store.data.settings?.shopName || 'صيانة الموبايل'}</h2>
                <p class="text-xs text-slate-500">نظام المحاسبة المتكامل</p>
              </div>
            </div>
          </div>
          
          <div class="p-3 grid grid-cols-2 gap-2 border-b border-slate-200 dark:border-slate-700">
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 dark:from-green-900/30 dark:to-emerald-900/30 rounded-xl p-3 text-center">
              <p class="text-[10px] text-slate-500 mb-1">صافي الربح</p>
              <p class="font-bold text-green-600 dark:text-green-400">${fmt(profit - expenses)} د.أ</p>
            </div>
            <div class="bg-gradient-to-br from-red-50 to-rose-50 dark:from-red-900/30 dark:to-rose-900/30 rounded-xl p-3 text-center">
              <p class="text-[10px] text-slate-500 mb-1">الديون</p>
              <p class="font-bold text-red-600 dark:text-red-400">${fmt(debts)} د.أ</p>
            </div>
          </div>
          
          <nav class="p-2 space-y-1 max-h-[calc(100vh-280px)] overflow-y-auto">
            ${nav.map(n => `
              <button onclick="navigate('${n.id}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${state.page === n.id ? 'bg-gradient-to-l from-violet-600 to-blue-600 text-white shadow-lg shadow-violet-500/30' : 'hover:bg-slate-100 dark:hover:bg-slate-700'}">
                <i data-lucide="${n.icon}" class="w-5 h-5"></i>
                <span class="font-medium">${n.label}</span>
              </button>
            `).join('')}
          </nav>
          
          <div class="absolute bottom-0 inset-x-0 p-3 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
            <button onclick="openDialog('export')" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-gradient-to-l from-emerald-600 to-teal-600 text-white font-medium shadow-lg shadow-emerald-500/30 btn-press">
              <i data-lucide="download" class="w-5 h-5"></i>
              تصدير البيانات
            </button>
          </div>
        </aside>
      `;
    }
    
    function renderSidebar() {
      const nav = [
        { id: 'dashboard', icon: 'layout-dashboard', label: 'لوحة التحكم' },
        { id: 'repairs', icon: 'wrench', label: 'الصيانة' },
        { id: 'customers', icon: 'users', label: 'العملاء' },
        { id: 'inventory', icon: 'package', label: 'المخزون' },
        { id: 'invoices', icon: 'file-text', label: 'الفواتير' },
        { id: 'expenses', icon: 'receipt', label: 'المصاريف' },
        { id: 'debts', icon: 'credit-card', label: 'الديون' },
        { id: 'reports', icon: 'bar-chart-3', label: 'التقارير' },
        { id: 'backup', icon: 'database', label: 'النسخ الاحتياطي' },
        { id: 'settings', icon: 'settings', label: 'الإعدادات' }
      ];
      
      return `
        <aside class="hidden lg:flex flex-col fixed top-0 right-0 bottom-0 w-64 bg-white dark:bg-slate-800 border-l border-slate-200 dark:border-slate-700 z-30">
          <div class="p-4 border-b border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-3">
              <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-violet-600 to-blue-600 flex items-center justify-center shadow-lg shadow-violet-500/30">
                <i data-lucide="smartphone" class="w-5 h-5 text-white"></i>
              </div>
              <div>
                <h2 class="font-bold gradient-text">${Store.data.settings?.shopName || 'صيانة الموبايل'}</h2>
                <p class="text-[10px] text-slate-500">نظام المحاسبة</p>
              </div>
            </div>
          </div>
          
          <nav class="flex-1 p-2 space-y-1 overflow-y-auto">
            ${nav.map(n => `
              <button onclick="navigate('${n.id}')" class="w-full flex items-center gap-3 px-3 py-2 rounded-xl transition-all ${state.page === n.id ? 'bg-gradient-to-l from-violet-600 to-blue-600 text-white shadow-lg shadow-violet-500/30' : 'hover:bg-slate-100 dark:hover:bg-slate-700'}">
                <i data-lucide="${n.icon}" class="w-4 h-4"></i>
                <span class="text-sm font-medium">${n.label}</span>
              </button>
            `).join('')}
          </nav>
          
          <div class="p-3 border-t border-slate-200 dark:border-slate-700 space-y-2">
            <button onclick="openDialog('export')" class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-gradient-to-l from-emerald-600 to-teal-600 text-white text-sm font-medium shadow-md btn-press">
              <i data-lucide="download" class="w-4 h-4"></i>
              تصدير
            </button>
            <button onclick="toggleTheme()" class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
              <i data-lucide="${state.theme === 'dark' ? 'sun' : 'moon'}" class="w-4 h-4"></i>
              ${state.theme === 'dark' ? 'الوضع النهاري' : 'الوضع الليلي'}
            </button>
          </div>
        </aside>
      `;
    }
    
    function renderMain() {
      const pages = {
        dashboard: renderDashboard,
        customers: renderCustomers,
        repairs: renderRepairs,
        inventory: renderInventory,
        invoices: renderInvoices,
        expenses: renderExpenses,
        debts: renderDebts,
        reports: renderReports,
        backup: renderBackup,
        settings: renderSettings
      };
      return `<main class="lg:mr-64 pt-16 lg:pt-0 min-h-screen"><div class="p-4 lg:p-6 max-w-7xl mx-auto">${(pages[state.page] || pages.dashboard)()}</div></main>`;
    }
    
    // ==================== الصفحات ====================
    function renderDashboard() {
      const delivered = Store.data.repairs.filter(r => r.status === 'DELIVERED');
      const profit = delivered.reduce((s, r) => s + ((r.finalCost||0) - (r.maintenanceCost||0)), 0);
      const expenses = Store.data.expenses.reduce((s, e) => s + e.amount, 0);
      const debts = delivered.reduce((s, r) => s + (r.debt||0), 0);
      const pending = Store.data.repairs.filter(r => ['PENDING','DIAGNOSING','IN_PROGRESS','WAITING_PARTS'].includes(r.status)).length;
      const completed = Store.data.repairs.filter(r => r.status === 'COMPLETED').length;
      const lowStock = Store.data.inventory.filter(i => i.quantity <= i.minQuantity).length;
      
      return `
        <div class="mb-6">
          <h1 class="text-2xl font-bold mb-1">مرحباً بك 👋</h1>

            </div>
            <div class="flex gap-2 mt-6">
              <button type="button" onclick="closeDialog()" class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 font-medium">إلغاء</button>
              <button type="submit" class="flex-1 py-2.5 rounded-xl bg-gradient-to-l from-violet-600 to-blue-600 text-white font-medium btn-press">حفظ</button>
            </div>
          </form>
        `;
      }
      
      if (state.dialog === 'inventory') {
        const i = state.dialogData || {};
        content = `
          <form onsubmit="saveInventory(event)" class="p-6">
            <h2 class="text-xl font-bold mb-4">${i.id ? '✏️ تعديل صنف' : '➕ إضافة صنف'}</h2>
            <input type="hidden" id="inventoryId" value="${i.id || ''}">
            <div class="space-y-4">
              <div>
                <label class="block text-sm text-slate-500 mb-1">اسم الصنف *</label>
                <input type="text" id="inventoryName" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${i.name || ''}" required>
              </div>
              <div>
                <label class="block text-sm text-slate-500 mb-1">الفئة *</label>
                <select id="inventoryCategory" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" required>
                  <option value="">اختر</option>
                  ${INVENTORY_CATS.map(c => `<option value="${c}" ${i.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm text-slate-500 mb-1">الكمية</label>
                  <input type="number" id="inventoryQuantity" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${i.quantity || 0}" min="0">
                </div>
                <div>
                  <label class="block text-sm text-slate-500 mb-1">الحد الأدنى</label>
                  <input type="number" id="inventoryMinQuantity" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${i.minQuantity || 5}" min="0">
                </div>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm text-slate-500 mb-1">سعر الشراء</label>
                  <input type="number" id="inventoryCostPrice" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${i.costPrice || 0}" min="0">
                </div>
                <div>
                  <label class="block text-sm text-slate-500 mb-1">سعر البيع</label>
                  <input type="number" id="inventorySellingPrice" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${i.sellingPrice || 0}" min="0">
                </div>
              </div>
              <div>
                <label class="block text-sm text-slate-500 mb-1">المورد</label>
                <input type="text" id="inventorySupplier" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${i.supplier || ''}">
              </div>
            </div>
            <div class="flex gap-2 mt-6">
              <button type="button" onclick="closeDialog()" class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 font-medium">إلغاء</button>
              <button type="submit" class="flex-1 py-2.5 rounded-xl bg-gradient-to-l from-violet-600 to-blue-600 text-white font-medium btn-press">حفظ</button>
            </div>
          </form>
        `;
      }
      
      if (state.dialog === 'expense') {
        const e = state.dialogData || {};
        content = `
          <form onsubmit="saveExpense(event)" class="p-6">
            <h2 class="text-xl font-bold mb-4">${e.id ? '✏️ تعديل مصروف' : '➕ مصروف جديد'}</h2>
            <input type="hidden" id="expenseId" value="${e.id || ''}">
            <div class="space-y-4">
              <div>
                <label class="block text-sm text-slate-500 mb-1">الفئة *</label>
                <select id="expenseCategory" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" required>
                  <option value="">اختر</option>
                  ${EXPENSE_CATS.map(c => `<option value="${c}" ${e.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="block text-sm text-slate-500 mb-1">الوصف *</label>
                <input type="text" id="expenseDescription" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${e.description || ''}" required>
              </div>
              <div>
                <label class="block text-sm text-slate-500 mb-1">المبلغ (د.أ) *</label>
                <input type="number" id="expenseAmount" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${e.amount || ''}" required min="0">
              </div>
            </div>
            <div class="flex gap-2 mt-6">
              <button type="button" onclick="closeDialog()" class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 font-medium">إلغاء</button>
              <button type="submit" class="flex-1 py-2.5 rounded-xl bg-gradient-to-l from-red-600 to-rose-600 text-white font-medium btn-press">حفظ</button>
            </div>
          </form>
        `;
      }
      
      if (state.dialog === 'delivery') {
        const r = state.dialogData;
        const remaining = (r.finalCost || 0) - (r.deposit || 0);
        content = `
          <form onsubmit="confirmDelivery(event)" class="p-6">
            <h2 class="text-xl font-bold mb-4">📦 تأكيد التسليم</h2>
            <div class="bg-slate-50 dark:bg-slate-700 rounded-xl p-4 mb-4">
              <div class="space-y-2">
                <div class="flex justify-between"><span class="text-slate-500">العميل:</span><span class="font-medium">${getCust(r.customerId)}</span></div>
                <div class="flex justify-between"><span class="text-slate-500">الجهاز:</span><span>${r.deviceModel}</span></div>
                <div class="flex justify-between"><span class="text-slate-500">السعر:</span><span class="font-bold text-blue-600">${fmt(r.finalCost||0)} د.أ</span></div>
                <div class="flex justify-between"><span class="text-slate-500">العربون:</span><span class="text-green-600">${fmt(r.deposit||0)} د.أ</span></div>
              </div>
            </div>
            <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-xl p-4 mb-4 text-center">
              <p class="text-sm text-amber-600">المتبقي</p>
              <p class="text-2xl font-bold text-amber-700">${fmt(remaining)} د.أ</p>
            </div>
            <div class="space-y-4">
              <div>
                <label class="block text-sm text-slate-500 mb-1">المبلغ المدفوع</label>
                <input type="number" id="deliveryPaidAmount" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="${remaining}">
              </div>
              <div>
                <label class="block text-sm text-slate-500 mb-1">الدين (إن وجد)</label>
                <input type="number" id="deliveryDebt" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent" value="0">
              </div>
            </div>
            <div class="flex gap-2 mt-6">
              <button type="button" onclick="closeDialog()" class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 font-medium">إلغاء</button>
              <button type="submit" class="flex-1 py-2.5 rounded-xl bg-gradient-to-l from-green-600 to-emerald-600 text-white font-medium btn-press">✓ تأكيد التسليم</button>
            </div>
          </form>
        `;
      }
      
      if (state.dialog === 'confirm') {
        content = `
          <div class="p-6 text-center">
            <div class="w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4">
              <i data-lucide="trash-2" class="w-8 h-8 text-red-600"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">تأكيد الحذف</h2>
            <p class="text-slate-500 mb-6">${state.deleteInfo?.message || 'هل أنت متأكد؟'}</p>
            <div class="flex gap-2">
              <button onclick="closeDialog()" class="flex-1 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 font-medium">إلغاء</button>
              <button onclick="executeDelete()" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white font-medium btn-press">حذف</button>
            </div>
          </div>
        `;
      }
      
      return `
        <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in" onclick="closeDialog()">
          <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto animate-scale-in shadow-2xl" onclick="event.stopPropagation()">
            ${content}
          </div>
        </div>
      `;
    }
    
    // ==================== الإجراءات ====================
    function navigate(page) { state.page = page; state.drawer = false; render(); }
    function toggleDrawer() { state.drawer = !state.drawer; render(); }
    function toggleTheme() { state.theme = state.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', state.theme); render(); }
    
    function openDialog(type, id) {
      state.dialog = type;
      if (type === 'customer') state.dialogData = id ? Store.get('customers', id) : null;
      else if (type === 'repair') state.dialogData = id ? Store.get('repairs', id) : null;
      else if (type === 'inventory') state.dialogData = id ? Store.get('inventory', id) : null;
      else if (type === 'expense') state.dialogData = id ? Store.get('expenses', id) : null;
      else if (type === 'delivery') state.dialogData = id ? Store.get('repairs', id) : null;
      else state.dialogData = null;
      render();
    }
    
    function closeDialog() { state.dialog = null; state.dialogData = null; state.deleteInfo = null; render(); }
    
    function saveCustomer(e) {
      e.preventDefault();
      const id = $('customerId').value;
      const data = {
        name: $('customerName').value.trim(),
        phone: $('customerPhone').value.trim(),
        address: $('customerAddress').value.trim(),
        notes: $('customerNotes').value.trim()
      };
      if (id) Store.update('customers', id, data); else Store.add('customers', data);
      toast(id ? 'تم تحديث العميل' : 'تم إضافة العميل');
      closeDialog();
    }
    
    function saveRepair(e) {
      e.preventDefault();
      const id = $('repairId').value;
      const data = {
        customerId: $('repairCustomer').value,
        deviceType: $('repairDeviceType').value,
        deviceModel: $('repairDeviceModel').value.trim(),
        problem: $('repairProblem').value.trim(),
        status: $('repairStatus').value,
        deposit: parseFloat($('repairDeposit').value) || 0,
        maintenanceCost: parseFloat($('repairMaintenanceCost').value) || null,
        finalCost: parseFloat($('repairFinalCost').value) || null,
        notes: $('repairNotes').value.trim()
      };
      if (id) Store.update('repairs', id, data); else Store.add('repairs', data);
      toast(id ? 'تم تحديث الطلب' : 'تم إضافة الطلب');
      closeDialog();
    }
    
    function saveInventory(e) {
      e.preventDefault();
      const id = $('inventoryId').value;
      const data = {
        name: $('inventoryName').value.trim(),
        category: $('inventoryCategory').value,
        quantity: parseInt($('inventoryQuantity').value) || 0,
        minQuantity: parseInt($('inventoryMinQuantity').value) || 5,
        costPrice: parseFloat($('inventoryCostPrice').value) || 0,
        sellingPrice: parseFloat($('inventorySellingPrice').value) || 0,
        supplier: $('inventorySupplier').value.trim()
      };
      if (id) Store.update('inventory', id, data); else Store.add('inventory', data);
      toast(id ? 'تم تحديث الصنف' : 'تم إضافة الصنف');
      closeDialog();
    }
    
    function saveExpense(e) {
      e.preventDefault();
      const id = $('expenseId').value;
      const data = {
        category: $('expenseCategory').value,
        description: $('expenseDescription').value.trim(),
        amount: parseFloat($('expenseAmount').value) || 0,
        date: new Date().toISOString()
      };
      if (id) Store.update('expenses', id, data); else Store.add('expenses', data);
      toast(id ? 'تم تحديث المصروف' : 'تم إضافة المصروف');
      closeDialog();
    }
    
    function confirmDelivery(e) {
      e.preventDefault();
      const paid = parseFloat($('deliveryPaidAmount').value) || 0;
      const debt = parseFloat($('deliveryDebt').value) || 0;
      Store.update('repairs', state.dialogData.id, { status: 'DELIVERED', paidAmount: paid, debt: debt, deliveredAt: new Date().toISOString() });
      toast('تم تأكيد التسليم');
      closeDialog();
    }
    
    function confirmDelete(collection, id) {
      let name = '';
      if (collection === 'customers') name = Store.get('customers', id)?.name;
      else if (collection === 'repairs') name = 'هذا الطلب';
      else if (collection === 'inventory') name = Store.get('inventory', id)?.name;
      else if (collection === 'expenses') name = 'هذا المصروف';
      state.deleteInfo = { collection, id, message: `هل أنت متأكد من حذف "${name}"؟` };
      state.dialog = 'confirm';
      render();
    }
    
    function executeDelete() {
      if (state.deleteInfo) Store.delete(state.deleteInfo.collection, state.deleteInfo.id);
      toast('تم الحذف');
      closeDialog();
    }
    
    function payDebt(id) {
      const r = Store.get('repairs', id);
      if (r && r.debt > 0) {
        Store.update('repairs', id, { paidAmount: (r.paidAmount || 0) + r.debt, debt: 0 });
        toast('تم تسديد الدين');
        render();
      }
    }
    
    function saveSettings() {
      Store.data.settings = {
        shopName: $('shopName').value,
        phone: $('shopPhone').value,
        address: $('shopAddress').value
      };
      Store.save();
      toast('تم حفظ الإعدادات');
    }
    
    // ==================== النسخ الاحتياطي ====================
    function createBackup() {
      const data = { version: '2.0', date: new Date().toISOString(), data: Store.data };
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
      a.download = 'backup_' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      toast('تم إنشاء النسخة الاحتياطية');
    }
    
    function restoreBackup(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.data && confirm('سيتم استبدال جميع البيانات. متأكد؟')) {
            Store.data = data.data;
            Store.save();
            render();
            toast('تم استرجاع النسخة');
          }
        } catch(err) { toast('ملف غير صالح', 'error'); }
      };
      reader.readAsText(file);
    }
    
    function clearAllData() {
      if (confirm('هل أنت متأكد من مسح جميع البيانات؟') && confirm('تأكيد نهائي - لا يمكن التراجع!')) {
        localStorage.removeItem('mobileRepairApp_v2');
        Store.data = { customers: [], repairs: [], inventory: [], invoices: [], expenses: [] };
        render();
        toast('تم مسح جميع البيانات');
      }
    }
    
    function exportExcel() {
      let csv = '\ufeffالعملاء\n#,الاسم,الهاتف,العنوان,ملاحظات\n';
      Store.data.customers.forEach((c, i) => csv += `${i+1},"${c.name}","${c.phone}","${c.address||''}","${c.notes||''}"\n`);
      csv += '\nطلبات الصيانة\n#,العميل,الجهاز,المشكلة,الحالة,التكلفة,السعر\n';
      Store.data.repairs.forEach((r, i) => csv += `${i+1},"${getCust(r.customerId)}","${r.deviceModel}","${r.problem}","${getStatus(r.status).l}",${r.maintenanceCost||0},${r.finalCost||0}\n`);
      csv += '\nالمخزون\n#,الاسم,الفئة,الكمية,سعر الشراء,سعر البيع\n';
      Store.data.inventory.forEach((i, n) => csv += `${n+1},"${i.name}","${i.category}",${i.quantity},${i.costPrice},${i.sellingPrice}\n`);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
      a.download = 'report_' + new Date().toISOString().split('T')[0] + '.csv';
      a.click();
      toast('تم التصدير');
      closeDialog();
    }
    
    function exportJSON() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify({ date: new Date().toISOString(), ...Store.data }, null, 2)], { type: 'application/json' }));
      a.download = 'data_' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      toast('تم التصدير');
      closeDialog();
    }
    
    // ==================== الرسوم البيانية ====================
    function initCharts() {
      if (state.page !== 'reports') return;
      
      // Status Chart
      const statusCanvas = $('statusChart');
      if (statusCanvas && window.Chart) {
        const counts = {};
        Store.data.repairs.forEach(r => counts[r.status] = (counts[r.status] || 0) + 1);
        const data = STATUS.filter(s => counts[s.v] > 0).map(s => ({ l: s.l, v: counts[s.v], c: s.c.replace('bg-', '') }));
        new Chart(statusCanvas, {
          type: 'doughnut',
          data: { labels: data.map(d => d.l), datasets: [{ data: data.map(d => d.v), backgroundColor: ['#f59e0b', '#3b82f6', '#f97316', '#8b5cf6', '#22c55e', '#14b8a6', '#ef4444'] }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        $('statusLegend').innerHTML = data.map((d, i) => `<span class="px-2 py-1 rounded-full text-xs" style="background:${['#f59e0b','#3b82f6','#f97316','#8b5cf6','#22c55e','#14b8a6','#ef4444'][i]}20;color:${['#f59e0b','#3b82f6','#f97316','#8b5cf6','#22c55e','#14b8a6','#ef4444'][i]}">${d.l}: ${d.v}</span>`).join('');
      }
      
      // Device Chart
      const deviceCanvas = $('deviceChart');
      if (deviceCanvas && window.Chart) {
        const counts = {};
        Store.data.repairs.forEach(r => counts[r.deviceType] = (counts[r.deviceType] || 0) + 1);
        const data = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
        const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
        new Chart(deviceCanvas, {
          type: 'doughnut',
          data: { labels: data.map(d => d[0]), datasets: [{ data: data.map(d => d[1]), backgroundColor: colors }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        $('deviceLegend').innerHTML = data.map((d, i) => `<span class="px-2 py-1 rounded-full text-xs" style="background:${colors[i]}20;color:${colors[i]}">${d[0]}: ${d[1]}</span>`).join('');
      }
    }
    
    // ==================== تهيئة ====================
    render();
    setTimeout(() => { if (state.page === 'reports') initCharts(); }, 100);
    
    // Re-init charts when navigating to reports
    const originalNavigate = navigate;
    navigate = function(page) {
      originalNavigate(page);
      if (page === 'reports') setTimeout(initCharts, 200);
    };
  </script>
</body>
</html>
