<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7c3aed">
  <title>نظام محاسبة صيانة الموبايل</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Cairo', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    .animate-scale-in { animation: scaleIn 0.2s ease-out; }
    
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .dark .glass { background: rgba(30, 41, 59, 0.95); }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-300">
  <div id="app"></div>
  <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"></div>
  
  <script>
    // ==================== المتجر (Store) ====================
    const Store = {

        expenses: []

      init() {

        if (saved) { try { this.data = JSON.parse(saved); } catch(e) {} }

      },
      
      save() { localStorage.setItem('mobileRepairApp_v3', JSON.stringify(this.data)); },
      
      sampleData() {

            { id: 'c1', name: 'أحمد محمد علي', phone: '0791234567', email: 'ahmed@email.com', address: 'عمان - عبدون', notes: 'عميل VIP', createdAt: new Date().toISOString() },
            { id: 'c2', name: 'سارة خالد أحمد', phone: '0797654321', email: '', address: 'الزرقاء - الرصيفة', notes: '', createdAt: new Date().toISOString() },
            { id: 'c3', name: 'محمد عبدالله', phone: '0799876543', email: '', address: 'إربد', notes: '', createdAt: new Date().toISOString() },
            { id: 'c4', name: 'فاطمة حسن', phone: '0795551234', email: 'fatima@email.com', address: 'عمان - خلدا', notes: 'تواصل واتساب', createdAt: new Date().toISOString() }

            { id: 'r2', customerId: 'c2', deviceType: 'Samsung', deviceModel: 'Galaxy S23 Ultra', problem: 'البطارية تفرغ بسرعة كبيرة والجهاز يسخن', status: 'IN_PROGRESS', maintenanceCost: 45, finalCost: 120, deposit: 30, paidAmount: 0, debt: 0, createdAt: '2024-02-25', entryDate: '2024-02-25', notes: 'تحتاج بطارية جديدة' },

            { id: 'r5', customerId: 'c1', deviceType: 'Huawei', deviceModel: 'Mate 50 Pro', problem: 'الكاميرا الخلفية لا تعمل', status: 'WAITING_PARTS', maintenanceCost: 80, finalCost: 180, deposit: 50, paidAmount: 0, debt: 0, createdAt: '2024-02-24', entryDate: '2024-02-24', notes: 'بانتظار وصول الكاميرا' }
          ],

            { id: 'i1', name: 'شاشة iPhone 14 Pro Max أصلية', category: 'شاشات', brand: 'Apple', quantity: 3, minQuantity: 2, costPrice: 180, sellingPrice: 280, createdAt: new Date().toISOString() },
            { id: 'i2', name: 'بطارية Samsung Galaxy S23', category: 'بطاريات', brand: 'Samsung', quantity: 8, minQuantity: 3, costPrice: 35, sellingPrice: 70, createdAt: new Date().toISOString() },

            { id: 'i4', name: 'كابل USB-C أصلي 2م', category: 'إكسسوارات', brand: 'Generic', quantity: 2, minQuantity: 5, costPrice: 8, sellingPrice: 20, createdAt: new Date().toISOString() },
            { id: 'i5', name: 'واقي شاشة iPhone 14', category: 'واقيات', brand: 'Generic', quantity: 25, minQuantity: 10, costPrice: 3, sellingPrice: 10, createdAt: new Date().toISOString() },
            { id: 'i6', name: 'كاميرا خلفية iPhone 12', category: 'قطع غيار', brand: 'Apple', quantity: 0, minQuantity: 2, costPrice: 60, sellingPrice: 120, createdAt: new Date().toISOString() }
          ],
          expenses: [
            { id: 'e1', category: 'إيجار', description: 'إيجار المحل - شباط 2024', amount: 350, date: '2024-02-01', createdAt: new Date().toISOString() },
            { id: 'e2', category: 'كهرباء', description: 'فاتورة الكهرباء - كانون الثاني', amount: 65, date: '2024-02-05', createdAt: new Date().toISOString() },
            { id: 'e3', category: 'مشتريات', description: 'شراء قطع غيار من الصين', amount: 500, date: '2024-02-10', createdAt: new Date().toISOString() },
            { id: 'e4', category: 'رواتب', description: 'راتب الموظف - شباط', amount: 400, date: '2024-02-28', createdAt: new Date().toISOString() }
          ],
          invoices: [
            { id: 'inv1', invoiceNumber: 'INV-2024-001', customerId: 'c1', repairId: 'r1', total: 350, paid: 350, status: 'PAID', createdAt: '2024-02-23' }
          ]
        };
        this.save();
      },
      
      add(col, item) { item.id = Date.now().toString(); item.createdAt = new Date().toISOString(); this.data[col].push(item); this.save(); return item; },
      update(col, id, data) { const i = this.data[col].findIndex(x => x.id === id); if (i > -1) { this.data[col][i] = {...this.data[col][i], ...data, updatedAt: new Date().toISOString()}; this.save(); } },
      delete(col, id) { this.data[col] = this.data[col].filter(x => x.id !== id); this.save(); },
      get(col, id) { return this.data[col]?.find(x => x.id === id); }
    };
    Store.init();
    
    // ==================== الحالة ====================
    let state = {
      page: 'dashboard',
      theme: localStorage.getItem('theme') || 'light',
      drawer: false,
      dialog: null,
      dialogData: null,
      deleteInfo: null,
      searchTerm: '',
      statusFilter: 'all'
    };
    
    // تطبيق الوضع الليلي فوراً
    if (state.theme === 'dark') {
      document.documentElement.classList.add('dark');
    }
    
    // ==================== الثوابت ====================
    const STATUS = [
      { v: 'PENDING', l: 'قيد الانتظار', c: 'bg-yellow-500' },
      { v: 'DIAGNOSING', l: 'قيد التشخيص', c: 'bg-blue-500' },
      { v: 'WAITING_PARTS', l: 'في انتظار القطع', c: 'bg-orange-500' },
      { v: 'IN_PROGRESS', l: 'قيد الإصلاح', c: 'bg-purple-500' },
      { v: 'COMPLETED', l: 'تم الإصلاح', c: 'bg-green-500' },
      { v: 'DELIVERED', l: 'تم التسليم', c: 'bg-teal-500' },
      { v: 'CANCELLED', l: 'ملغي', c: 'bg-red-500' }
    ];
    
    const DEVICES = ['iPhone', 'Samsung', 'Huawei', 'Xiaomi', 'Oppo', 'Vivo', 'Realme', 'Nokia', 'LG', 'HTC', 'Sony', 'Motorola', 'أخرى'];
    const EXPENSE_CATS = ['إيجار', 'كهرباء', 'ماء', 'رواتب', 'مشتريات', 'صيانة', 'نقل', 'ضرائب', 'تسويق', 'أخرى'];
    const INVENTORY_CATS = ['شاشات', 'بطاريات', 'قطع غيار', 'إكسسوارات', 'واقيات', 'سماعات', 'أخرى'];
    
    // ==================== الدوال المساعدة ====================
    const fmt = n => (n||0).toLocaleString('ar-SA');
    const fdate = d => d ? new Date(d).toLocaleDateString('ar-SA') : '-';
    const getCust = id => Store.data.customers.find(c => c.id === id)?.name || 'غير معروف';
    const getStatus = v => STATUS.find(s => s.v === v) || STATUS[0];
    const $ = id => document.getElementById(id);
    
    function toast(msg, type='success') {
      const container = $('toast-container');
      const colors = { success: 'bg-green-600', error: 'bg-red-600', warning: 'bg-amber-600', info: 'bg-blue-600' };
      const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
      const t = document.createElement('div');
      t.className = colors[type] + ' text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 animate-fade-in';
      t.innerHTML = '<span class="text-lg">' + icons[type] + '</span><span>' + msg + '</span>';
      container.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
    
    // ==================== العرض ====================
    function render() {
      $('app').innerHTML = renderApp();
      lucide.createIcons();
      document.documentElement.classList.toggle('dark', state.theme === 'dark');
      if (state.page === 'reports') setTimeout(initCharts, 200);
    }
    
    function renderApp() {
      return renderMobileNav() + renderDrawer() + renderSidebar() + renderMain() + renderDialogs();
    }
    
    function renderMobileNav() {
      const titles = { dashboard: 'الرئيسية', customers: 'العملاء', repairs: 'الصيانة', inventory: 'المخزون', invoices: 'الفواتير', expenses: 'المصاريف', debts: 'الديون', reports: 'التقارير', backup: 'النسخ الاحتياطي' };
      return `
        <header class="fixed top-0 left-0 right-0 z-40 glass border-b border-slate-200 dark:border-slate-700 md:hidden shadow-sm">
          <div class="flex items-center justify-between px-4 h-14">
            <button onclick="toggleDrawer()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
              <i data-lucide="menu" class="h-6 w-6"></i>
            </button>
            <div class="flex items-center gap-2">
              <i data-lucide="${getPageIcon()}" class="h-5 w-5 text-violet-600"></i>
              <h1 class="font-bold text-lg">${titles[state.page] || 'الرئيسية'}</h1>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
              <i data-lucide="${state.theme === 'dark' ? 'sun' : 'moon'}" class="h-5 w-5 ${state.theme === 'dark' ? 'text-yellow-500' : 'text-blue-500'}"></i>
            </button>
          </div>
        </header>
      `;
    }
    
    function getPageIcon() {
      const icons = { dashboard: 'layout-dashboard', customers: 'users', repairs: 'wrench', inventory: 'package', invoices: 'file-text', expenses: 'receipt', debts: 'credit-card', reports: 'bar-chart-3', backup: 'database' };
      return icons[state.page] || 'layout-dashboard';
    }
    
    function renderDrawer() {
      const nav = [
        { id: 'dashboard', label: 'الرئيسية', icon: 'layout-dashboard' },
        { id: 'repairs', label: 'الصيانة', icon: 'wrench' },
        { id: 'customers', label: 'العملاء', icon: 'users' },
        { id: 'inventory', label: 'المخزون', icon: 'package' },
        { id: 'invoices', label: 'الفواتير', icon: 'file-text' },
        { id: 'expenses', label: 'المصاريف', icon: 'receipt' },
        { id: 'debts', label: 'الديون', icon: 'credit-card' },
        { id: 'reports', label: 'التقارير', icon: 'bar-chart-3' },
        { id: 'backup', label: 'النسخ الاحتياطي', icon: 'database' }
      ];
      
      const delivered = Store.data.repairs.filter(r => r.status === 'DELIVERED');
      const profit = delivered.reduce((s, r) => s + ((r.finalCost||0) - (r.maintenanceCost||0)), 0);
      const expenses = Store.data.expenses.reduce((s, e) => s + e.amount, 0);
      const debts = delivered.reduce((s, r) => s + (r.debt||0), 0);
      
      return `
        <div class="fixed inset-0 bg-black/50 z-50 md:hidden transition-opacity duration-300 ${state.drawer ? 'opacity-100' : 'opacity-0 pointer-events-none'}" onclick="toggleDrawer()"></div>
        <div class="fixed top-0 right-0 bottom-0 w-72 max-w-[85vw] bg-white dark:bg-slate-800 z-50 md:hidden transition-transform duration-300 shadow-xl ${state.drawer ? 'translate-x-0' : 'translate-x-full'}">
          <div class="flex flex-col h-full">
            <div class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-slate-700">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-violet-600 rounded-xl">
                  <i data-lucide="smartphone" class="h-6 w-6 text-white"></i>
                </div>
                <div>
                  <h1 class="font-bold text-lg">صيانة موبايل</h1>
                  <p class="text-xs text-slate-500">نظام المحاسبة</p>
                </div>
              </div>
              <button onclick="toggleDrawer()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
                <i data-lucide="x" class="h-5 w-5"></i>
              </button>
            </div>
            
            <div class="p-3 grid grid-cols-2 gap-2 border-b border-slate-200 dark:border-slate-700">
              <div class="bg-green-50 dark:bg-green-900/20 rounded-xl p-3 text-center">
                <p class="text-[10px] text-slate-500 mb-1">صافي الربح</p>
                <p class="font-bold text-green-600">${fmt(profit - expenses)} د.أ</p>
              </div>
              <div class="bg-red-50 dark:bg-red-900/20 rounded-xl p-3 text-center">
                <p class="text-[10px] text-slate-500 mb-1">الديون</p>
                <p class="font-bold text-red-600">${fmt(debts)} د.أ</p>
              </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3">
              <div class="space-y-1">
                ${nav.map(n => `
                  <button onclick="navigate('${n.id}')" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg transition-colors ${state.page === n.id ? 'bg-violet-600 text-white' : 'hover:bg-slate-100 dark:hover:bg-slate-700'}">
                    <i data-lucide="${n.icon}" class="h-5 w-5"></i>
                    <span class="font-medium flex-1 text-right">${n.label}</span>
                    ${state.page === n.id ? '<i data-lucide="chevron-left" class="h-4 w-4"></i>' : ''}
                  </button>
                `).join('')}
              </div>
            </div>
            
            <div class="p-3 border-t border-slate-200 dark:border-slate-700">
              <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
                <i data-lucide="${state.theme === 'dark' ? 'sun' : 'moon'}" class="h-5 w-5 ${state.theme === 'dark' ? 'text-yellow-500' : 'text-blue-500'}"></i>
                <span class="font-medium">${state.theme === 'dark' ? 'الوضع النهاري' : 'الوضع الليلي'}</span>
              </button>
              <p class="text-xs text-slate-400 text-center mt-3">جميع الحقوق محفوظة © 2024</p>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderSidebar() {
      const nav = [
        { id: 'dashboard', label: 'الرئيسية', icon: 'layout-dashboard' },
        { id: 'repairs', label: 'الصيانة', icon: 'wrench' },
        { id: 'customers', label: 'العملاء', icon: 'users' },
        { id: 'inventory', label: 'المخزون', icon: 'package' },
        { id: 'invoices', label: 'الفواتير', icon: 'file-text' },
        { id: 'expenses', label: 'المصاريف', icon: 'receipt' },
        { id: 'debts', label: 'الديون', icon: 'credit-card' },
        { id: 'reports', label: 'التقارير', icon: 'bar-chart-3' },
        { id: 'backup', label: 'النسخ الاحتياطي', icon: 'database' }
      ];
      
      return `
        <aside class="hidden md:flex fixed top-0 left-0 z-30 h-full w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex-col shadow-sm">
          <div class="flex items-center gap-3 p-4 border-b border-slate-200 dark:border-slate-700">
            <div class="p-2 bg-violet-600 rounded-xl">
              <i data-lucide="smartphone" class="h-6 w-6 text-white"></i>
            </div>
            <div>
              <h1 class="font-bold text-lg">صيانة موبايل</h1>
              <p class="text-xs text-slate-500">نظام المحاسبة</p>
            </div>
          </div>
          
          <div class="flex-1 p-3 overflow-y-auto">
            <div class="space-y-1">
              ${nav.map(n => `
                <button onclick="navigate('${n.id}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors ${state.page === n.id ? 'bg-violet-600 text-white' : 'hover:bg-slate-100 dark:hover:bg-slate-700'}">
                  <i data-lucide="${n.icon}" class="h-5 w-5"></i>
                  <span class="font-medium">${n.label}</span>
                </button>
              `).join('')}
            </div>
          </div>
          
          <div class="p-3 border-t border-slate-200 dark:border-slate-700">
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-3 rounded-xl bg-slate-50 dark:bg-slate-700 hover:bg-slate-100 dark:hover:bg-slate-600 transition-colors">
              <i data-lucide="${state.theme === 'dark' ? 'sun' : 'moon'}" class="h-5 w-5 ${state.theme === 'dark' ? 'text-yellow-500' : 'text-blue-500'}"></i>
              <span class="font-medium">${state.theme === 'dark' ? 'الوضع النهاري' : 'الوضع الليلي'}</span>
            </button>
            <p class="text-xs text-slate-400 text-center mt-3">جميع الحقوق محفوظة © 2024</p>
          </div>
        </aside>
      `;
    }
    
    function renderMain() {
      const pages = { dashboard: renderDashboard, customers: renderCustomers, repairs: renderRepairs, inventory: renderInventory, invoices: renderInvoices, expenses: renderExpenses, debts: renderDebts, reports: renderReports, backup: renderBackup };
      return `<main class="md:mr-64 pt-16 md:pt-0 min-h-screen bg-slate-50 dark:bg-slate-900"><div class="p-3 md:p-6 lg:p-8 max-w-7xl mx-auto">${(pages[state.page] || pages.dashboard)()}</div></main>`;
    }
    
    // ==================== الصفحات ====================
    function renderDashboard() {
      const delivered = Store.data.repairs.filter(r => r.status === 'DELIVERED');
      const totalRepairsProfit = delivered.reduce((s, r) => s + ((r.finalCost||0) - (r.maintenanceCost||0)), 0);
      const totalExpenses = Store.data.expenses.reduce((s, e) => s + e.amount, 0);
      const totalDebts = delivered.reduce((s, r) => s + (r.debt||0), 0);
      const netProfit = totalRepairsProfit - totalExpenses;
      const pending = Store.data.repairs.filter(r => ['PENDING','DIAGNOSING','IN_PROGRESS'].includes(r.status)).length;
      const completed = Store.data.repairs.filter(r => ['COMPLETED','DELIVERED'].includes(r.status)).length;
      const lowStock = Store.data.inventory.filter(i => i.quantity <= i.minQuantity).length;
      const totalFinalCosts = delivered.reduce((s, r) => s + (r.finalCost||0), 0);
      
      const statusCounts = Store.data.repairs.reduce((acc, r) => { acc[r.status] = (acc[r.status] || 0) + 1; return acc; }, {});
      const recentRepairs = [...Store.data.repairs].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
      const topProfitable = [...delivered].filter(r => r.finalCost && r.maintenanceCost).map(r => ({...r, profit: r.finalCost - r.maintenanceCost})).sort((a, b) => b.profit - a.profit).slice(0, 3);
      
      return `
        <div class="space-y-4 md:space-y-6">
          <div>
            <h1 class="text-2xl md:text-3xl font-bold">لوحة التحكم</h1>
            <p class="text-sm md:text-base text-slate-500">مرحباً بك في نظام محاسبة صيانة الموبايل</p>
          </div>
          
          <!-- بطاقات الأرباح -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 md:gap-4">
            ${[
              { label: 'أرباح الصيانة', value: totalRepairsProfit, icon: 'trending-up', color: 'text-emerald-600', bg: 'bg-emerald-500' },

    function setStatusFilter(v) { state.statusFilter = v; render(); }
    
    function openDialog(type, id) {
      state.dialog = type;
      if (type === 'customer') state.dialogData = id ? Store.get('customers', id) : null;
      else if (type === 'repair') state.dialogData = id ? Store.get('repairs', id) : null;
      else if (type === 'inventory') state.dialogData = id ? Store.get('inventory', id) : null;
      else if (type === 'expense') state.dialogData = id ? Store.get('expenses', id) : null;
      else if (type === 'delivery' || type === 'view' || type === 'payDebt') state.dialogData = id ? Store.get('repairs', id) : null;
      else state.dialogData = null;
      render();
    }
    
    function closeDialog() { state.dialog = null; state.dialogData = null; state.deleteInfo = null; render(); }
    
    function viewRepair(id) { state.dialog = 'view'; state.dialogData = Store.get('repairs', id); render(); }
    
    function changeStatus(id, newStatus) {
      const r = Store.get('repairs', id);
      if (newStatus === 'DELIVERED' && r.status !== 'DELIVERED') {
        state.dialog = 'delivery';
        state.dialogData = r;
        render();
        return;
      }
      Store.update('repairs', id, { status: newStatus, completedAt: newStatus === 'COMPLETED' ? new Date().toISOString() : null });
      toast('تم تحديث الحالة');
      render();
    }
    
    function setPayment(type) {
      const r = state.dialogData;
      const remaining = (r.finalCost || 0) - (r.deposit || 0);
      
      $('btn-full').className = 'h-auto py-3 flex flex-col items-center rounded-lg border ' + (type === 'full' ? 'border-2 border-green-500 bg-green-500 text-white' : 'border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700');
      $('btn-partial').className = 'h-auto py-3 flex flex-col items-center rounded-lg border ' + (type === 'partial' ? 'border-2 border-orange-500 bg-orange-500 text-white' : 'border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700');
      $('btn-none').className = 'h-auto py-3 flex flex-col items-center rounded-lg border ' + (type === 'none' ? 'border-2 border-red-500 bg-red-500 text-white' : 'border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700');
      
      $('partialFields').classList.toggle('hidden', type !== 'partial');
      
      if (type === 'full') {
        $('deliveryPaidAmount').value = remaining;
        $('deliveryDebt').value = 0;
      } else if (type === 'none') {
        $('deliveryPaidAmount').value = 0;
        $('deliveryDebt').value = remaining;
      }
      $('deliveryPayment').value = type;
    }
    
    function updatePartial() {
      const r = state.dialogData;
      const remaining = (r.finalCost || 0) - (r.deposit || 0);
      const paid = parseFloat($('deliveryPartialPaid').value) || 0;
      const debt = remaining - paid;
      $('deliveryPartialDebt').value = Math.max(0, debt);
    }
    
    function saveCustomer(e) {
      e.preventDefault();
      const id = $('customerId').value;
      const data = {
        name: $('customerName').value.trim(),
        phone: $('customerPhone').value.trim(),
        email: $('customerEmail').value.trim(),
        address: $('customerAddress').value.trim(),
        notes: $('customerNotes').value.trim()
      };
      if (id) Store.update('customers', id, data); else Store.add('customers', data);
      toast(id ? 'تم تحديث العميل' : 'تم إضافة العميل');
      closeDialog();
    }
    
    function saveRepair(e) {
      e.preventDefault();
      const id = $('repairId').value;
      const data = {
        customerId: $('repairCustomer').value,
        deviceType: $('repairDeviceType').value,
        deviceModel: $('repairDeviceModel').value.trim(),
        problem: $('repairProblem').value.trim(),
        status: $('repairStatus').value,
        entryDate: $('repairEntryDate').value || new Date().toISOString().split('T')[0],
        deposit: parseFloat($('repairDeposit').value) || 0,
        maintenanceCost: parseFloat($('repairMaintenanceCost').value) || null,
        finalCost: parseFloat($('repairFinalCost').value) || null,
        notes: $('repairNotes').value.trim()
      };
      if (id) Store.update('repairs', id, data); else Store.add('repairs', data);
      toast(id ? 'تم تحديث الطلب' : 'تم إضافة الطلب');
      closeDialog();
    }
    
    function saveInventory(e) {
      e.preventDefault();
      const id = $('inventoryId').value;
      const data = {
        name: $('inventoryName').value.trim(),
        category: $('inventoryCategory').value,
        quantity: parseInt($('inventoryQuantity').value) || 0,
        minQuantity: parseInt($('inventoryMinQuantity').value) || 5,
        costPrice: parseFloat($('inventoryCostPrice').value) || 0,
        sellingPrice: parseFloat($('inventorySellingPrice').value) || 0
      };
      if (id) Store.update('inventory', id, data); else Store.add('inventory', data);
      toast(id ? 'تم تحديث الصنف' : 'تم إضافة الصنف');
      closeDialog();
    }
    
    function saveExpense(e) {
      e.preventDefault();
      const id = $('expenseId').value;
      const data = {
        category: $('expenseCategory').value,
        description: $('expenseDescription').value.trim(),
        amount: parseFloat($('expenseAmount').value) || 0,
        date: new Date().toISOString()
      };
      if (id) Store.update('expenses', id, data); else Store.add('expenses', data);
      toast(id ? 'تم تحديث المصروف' : 'تم إضافة المصروف');
      closeDialog();
    }
    
    function confirmDelivery(e) {
      e.preventDefault();
      const r = state.dialogData;
      const payment = $('deliveryPayment').value;
      const remaining = (r.finalCost || 0) - (r.deposit || 0);
      
      let paidAmount = 0, debt = 0;
      if (payment === 'full') { paidAmount = remaining; debt = 0; }
      else if (payment === 'none') { paidAmount = 0; debt = remaining; }
      else { paidAmount = parseFloat($('deliveryPartialPaid').value) || 0; debt = parseFloat($('deliveryPartialDebt').value) || 0; }
      
      Store.update('repairs', r.id, { status: 'DELIVERED', paidAmount, debt, deliveredAt: new Date().toISOString() });
      toast('تم تأكيد التسليم');
      closeDialog();
    }
    
    function confirmDelete(collection, id) {
      let name = '';
      if (collection === 'customers') name = Store.get('customers', id)?.name;
      else if (collection === 'repairs') name = 'هذا الطلب';
      else if (collection === 'inventory') name = Store.get('inventory', id)?.name;
      else if (collection === 'expenses') name = 'هذا المصروف';
      state.deleteInfo = { collection, id, message: 'هل أنت متأكد من حذف "' + name + '"؟' };
      state.dialog = 'confirm';
      render();
    }
    
    function executeDelete() {
      if (state.deleteInfo) Store.delete(state.deleteInfo.collection, state.deleteInfo.id);
      toast('تم الحذف');
      closeDialog();
    }
    
    function payDebt(id) {
      openDialog('payDebt', id);
    }
    
    function updateDebtRemaining() {
      const r = state.dialogData;
      const payment = parseFloat($('debtPaymentAmount').value) || 0;
      const remaining = r.debt - payment;
      const box = $('debtRemainingBox');
      const span = $('debtRemaining');
      
      if (payment < r.debt && payment > 0) {
        box.classList.remove('hidden');
        span.textContent = fmt(remaining) + ' د.أ';
      } else {
        box.classList.add('hidden');
      }
    }
    
    function confirmPayDebt(e) {
      e.preventDefault();
      const r = state.dialogData;
      const payment = parseFloat($('debtPaymentAmount').value) || 0;
      
      if (payment <= 0) {
        toast('يرجى إدخال مبلغ صحيح', 'error');
        return;
      }
      
      if (payment > r.debt) {
        toast('المبلغ أكبر من الدين المتبقي', 'error');
        return;
      }
      
      const newDebt = r.debt - payment;
      const newPaidAmount = (r.paidAmount || 0) + payment;
      
      Store.update('repairs', r.id, { 
        paidAmount: newPaidAmount, 
        debt: newDebt 
      });
      
      if (newDebt === 0) {
        toast('تم تسديد الدين بالكامل');
      } else {
        toast(`تم تسديد ${fmt(payment)} د.أ، المتبقي ${fmt(newDebt)} د.أ`);
      }
      
      closeDialog();
    }
    
    // ==================== النسخ الاحتياطي ====================
    function createBackup() {
      const data = { version: '3.0', date: new Date().toISOString(), data: Store.data };
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
      a.download = 'backup_' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      toast('تم إنشاء النسخة الاحتياطية');
    }
    
    function restoreBackup(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.data && confirm('سيتم استبدال جميع البيانات. متأكد؟')) {
            Store.data = data.data;
            Store.save();
            render();
            toast('تم استرجاع النسخة');
          }
        } catch(err) { toast('ملف غير صالح', 'error'); }
      };
      reader.readAsText(file);
    }
    
    function clearAllData() {
      if (confirm('هل أنت متأكد من مسح جميع البيانات؟') && confirm('تأكيد نهائي - لا يمكن التراجع!')) {
        localStorage.removeItem('mobileRepairApp_v3');
        Store.data = { customers: [], repairs: [], inventory: [], invoices: [], expenses: [] };
        render();
        toast('تم مسح جميع البيانات');
      }
    }
    
    function exportExcel() {
      let csv = '\ufeffالعملاء\n#,الاسم,الهاتف,البريد,العنوان,ملاحظات\n';
      Store.data.customers.forEach((c, i) => csv += (i+1) + ',"' + c.name + '","' + c.phone + '","' + (c.email||'') + '","' + (c.address||'') + '","' + (c.notes||'') + '"\n');
      csv += '\nطلبات الصيانة\n#,العميل,نوع الجهاز,الموديل,المشكلة,الحالة,تكلفة الصيانة,السعر النهائي\n';
      Store.data.repairs.forEach((r, i) => csv += (i+1) + ',"' + getCust(r.customerId) + '","' + r.deviceType + '","' + r.deviceModel + '","' + r.problem + '","' + getStatus(r.status).l + '",' + (r.maintenanceCost||0) + ',' + (r.finalCost||0) + '\n');
      csv += '\nالمخزون\n#,الاسم,الفئة,الكمية,الحد الأدنى,سعر الشراء,سعر البيع\n';
      Store.data.inventory.forEach((it, i) => csv += (i+1) + ',"' + it.name + '","' + it.category + '",' + it.quantity + ',' + it.minQuantity + ',' + it.costPrice + ',' + it.sellingPrice + '\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
      a.download = 'report_' + new Date().toISOString().split('T')[0] + '.csv';
      a.click();
      toast('تم التصدير');
      closeDialog();
    }
    
    function exportJSON() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify({ date: new Date().toISOString(), ...Store.data }, null, 2)], { type: 'application/json' }));
      a.download = 'data_' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      toast('تم التصدير');
      closeDialog();
    }
    
    // ==================== الرسوم البيانية ====================
    function initCharts() {
      const statusCanvas = $('statusChart');
      if (statusCanvas && window.Chart) {
        const counts = {};
        Store.data.repairs.forEach(r => counts[r.status] = (counts[r.status] || 0) + 1);
        const data = STATUS.filter(s => counts[s.v] > 0).map(s => ({ l: s.l, v: counts[s.v] }));
        new Chart(statusCanvas, {
          type: 'doughnut',
          data: { labels: data.map(d => d.l), datasets: [{ data: data.map(d => d.v), backgroundColor: ['#f59e0b', '#3b82f6', '#f97316', '#8b5cf6', '#22c55e', '#14b8a6', '#ef4444'] }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        $('statusLegend').innerHTML = data.map((d, i) => '<span class="px-2 py-1 rounded-full text-xs" style="background:' + ['#f59e0b','#3b82f6','#f97316','#8b5cf6','#22c55e','#14b8a6','#ef4444'][i] + '20;color:' + ['#f59e0b','#3b82f6','#f97316','#8b5cf6','#22c55e','#14b8a6','#ef4444'][i] + '">' + d.l + ': ' + d.v + '</span>').join('');
      }
      
      const deviceCanvas = $('deviceChart');
      if (deviceCanvas && window.Chart) {
        const counts = {};
        Store.data.repairs.forEach(r => counts[r.deviceType] = (counts[r.deviceType] || 0) + 1);
        const data = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
        const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
        new Chart(deviceCanvas, {
          type: 'doughnut',
          data: { labels: data.map(d => d[0]), datasets: [{ data: data.map(d => d[1]), backgroundColor: colors }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        $('deviceLegend').innerHTML = data.map((d, i) => '<span class="px-2 py-1 rounded-full text-xs" style="background:' + colors[i] + '20;color:' + colors[i] + '">' + d[0] + ': ' + d[1] + '</span>').join('');
      }
    }
    
    // ==================== تهيئة ====================
    render();
  </script>
</body>
</html>
